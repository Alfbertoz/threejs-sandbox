<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>04 — Gaussian Splats</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0d0b; }
  canvas { display: block; }

  .overlay {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    color: #ece8e0;
    pointer-events: none;
    mix-blend-mode: difference;
  }
  .overlay .num {
    font-size: 0.72rem;
    color: #c46d47;
    letter-spacing: 0.25em;
    margin-bottom: 6px;
  }
  .overlay .title {
    font-size: 0.88rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Shared chrome for the top-right button cluster */
  .top-right {
    position: fixed; top: 24px; right: 24px; z-index: 10;
    display: flex; gap: 10px; align-items: center;
  }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ece8e0;
    text-decoration: none;
    padding: 10px 16px;
    border: 1px solid rgba(236, 232, 224, 0.2);
    border-radius: 2px;
    background: rgba(14, 13, 11, 0.6);
    backdrop-filter: blur(8px);
    transition: color 0.25s ease, border-color 0.25s ease;
    cursor: pointer;
    user-select: none;
  }
  .chip:hover {
    border-color: #c46d47;
    color: #c46d47;
  }
  .chip.active {
    color: #c46d47;
    border-color: rgba(196, 109, 71, 0.5);
  }

  .hint {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(236, 232, 224, 0.4);
    pointer-events: none;
    text-align: center;
  }

  /* Splat picker — horizontal button row above the hint */
  .splat-picker {
    position: fixed; bottom: 60px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    display: flex; gap: 8px;
  }

  /* Loading indicator — small terracotta spinner + label */
  .loader {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(236, 232, 224, 0.55);
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .loader.gone { opacity: 0; }
  .spinner {
    width: 28px; height: 28px;
    border: 1.5px solid rgba(196, 109, 71, 0.2);
    border-top-color: #c46d47;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="overlay">
    <div class="num">EXPERIMENT / 04</div>
    <div class="title">Gaussian Splats</div>
  </div>

  <div class="top-right">
    <button class="chip" id="mode-toggle" type="button">Cinematic</button>
    <a class="chip" href="../../">← Index</a>
  </div>

  <div class="splat-picker" id="splat-picker"></div>

  <div class="hint" id="hint">Drag to orbit · Scroll to zoom</div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Loading splat</div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
