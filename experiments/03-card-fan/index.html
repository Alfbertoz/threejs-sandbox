<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>03 — Card Fan</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0d0b; }
  canvas { display: block; }

  .overlay {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    color: #ece8e0;
    pointer-events: none;
    mix-blend-mode: difference;
  }
  .overlay .num {
    font-size: 0.72rem;
    color: #c46d47;
    letter-spacing: 0.25em;
    margin-bottom: 6px;
  }
  .overlay .title {
    font-size: 0.88rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .back {
    position: fixed; top: 24px; right: 24px; z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ece8e0;
    text-decoration: none;
    padding: 10px 16px;
    border: 1px solid rgba(236, 232, 224, 0.2);
    border-radius: 2px;
    transition: all 0.3s ease;
    background: rgba(14, 13, 11, 0.6);
    backdrop-filter: blur(8px);
  }
  .back:hover {
    border-color: #c46d47;
    color: #c46d47;
  }

  .hint {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(236, 232, 224, 0.4);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="overlay">
    <div class="num">EXPERIMENT / 03</div>
    <div class="title">Card Fan</div>
  </div>

  <a class="back" href="../../">← Index</a>

  <div class="hint">Hover a card · Drag to orbit</div>

  <script type="module" src="./main.js"></script>
</body>
</html>
